name: questkids
description: "QuestKids 2.0 - EdTech Learning Platform"
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number is used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
# In Windows, build-name is used as the major, minor, and patch parts
# of the product and file versions while build-number is used as the build suffix.
version: 2.0.0+2

environment:
  sdk: '>=3.4.0 <4.0.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0

  # Authentication Providers
  google_sign_in: ^6.2.0

  # Google AI (Gemini) — kept for type compatibility, calls now proxied via Cloud Functions
  google_generative_ai: ^0.4.0

  # Charts — for analytics dashboards (Sub-project B)
  fl_chart: ^0.68.0

  # State Management
  provider: ^6.1.2

  # Local Storage (Offline)
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path_provider: ^2.1.0

  # UI
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Animations
  confetti: ^0.7.0
  flutter_animate: ^4.5.0

  # Utilities
  uuid: ^4.0.0
  path: ^1.9.0
  shared_preferences: ^2.2.0
  connectivity_plus: ^6.0.0
  image_picker: ^1.0.0
  flutter_image_compress: ^2.1.0
  flutter_tts: ^4.0.0
  # QR code generation (parent-child linking)
  qr_flutter: ^4.1.0
  # Calendar for parent shared events
  table_calendar: ^3.0.9
  # Export / share utilities
  csv: ^5.0.0
  pdf: ^3.10.1
  share_plus: ^10.0.0
  # Replaced file_picker (caused platform plugin packaging warnings) with
  # file_selector which provides a stable cross-platform file selector API.
  file_selector: ^1.1.0
  # Call Cloud Functions from Flutter (Gemini proxy, leaderboard, missions)
  cloud_functions: ^5.6.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  # setupFirebaseCoreMocks() for tests that touch Firebase-backed repos
  firebase_core_platform_interface: ^6.0.3

# sqlite3 >=3.0.0 loads its native library via Dart build hooks, which
# download a prebuilt binary from a GitHub release at build time. That
# download is unreachable from locked-down CI/sandbox networks and makes
# `flutter test` unrunnable there. Pin to the last hook-free release so
# sqflite_common_ffi (test/offline-desktop only) dlopens the system
# libsqlite3 instead — no network access needed to run tests.
dependency_overrides:
  sqlite3: 2.9.4

# App launcher / favicon icons generated from the QuestKids logo.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icon/questkids_logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/icon/questkids_logo.png"
    background_color: "#5C35F5"
    theme_color: "#5C35F5"

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # GLSL fragment shaders (GPU graphics). Compiled by the Flutter toolchain and
  # bundled for both mobile (Impeller) and web (CanvasKit).
  shaders:
    - shaders/aurora.frag

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/icon/
    - assets/questkids_logo.png

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
